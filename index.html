<script>
    // Custos REAIS acumulados até Fractal God
    // Valores oficiais aproximados do GW2 Wiki

    const progressionData = [
        {
            level: 0,
            title: "Nenhum",
            reqPristine: 3200,
            reqRelics: 183000,
            reqMatrices: 880
        },
        {
            level: 1,
            title: "Fractal Savant",
            reqPristine: 3200,
            reqRelics: 158000,
            reqMatrices: 805
        },
        {
            level: 2,
            title: "Fractal Prodigy",
            reqPristine: 2000,
            reqRelics: 123000,
            reqMatrices: 655
        },
        {
            level: 3,
            title: "Fractal Champion",
            reqPristine: 2000,
            reqRelics: 78000,
            reqMatrices: 405
        },
        {
            level: 4,
            title: "Fractal God",
            reqPristine: 0,
            reqRelics: 0,
            reqMatrices: 0
        }
    ];

    function calculate() {
        const currentTitle = parseInt(document.getElementById('currentTitle').value);

        const currentPristine =
            parseInt(document.getElementById('pristine').value) || 0;

        const currentRelics =
            parseInt(document.getElementById('relics').value) || 0;

        const dailyRate =
            parseInt(document.getElementById('dailyPristine').value) || 1;

        const target = progressionData[currentTitle];

        const missingPristine =
            Math.max(0, target.reqPristine - currentPristine);

        const missingRelics =
            Math.max(0, target.reqRelics - currentRelics);

        const missingMatrices =
            target.reqMatrices;

        // O verdadeiro timegate principal
        const daysRemaining =
            Math.ceil(missingPristine / dailyRate);

        const weeks =
            (daysRemaining / 7).toFixed(1);

        if (
            missingPristine === 0 &&
            missingRelics === 0
        ) {
            document.getElementById('timeResult').innerText =
                "Pronto para o God!";

            document.getElementById('missingResources').innerHTML = `
                <strong>Meta atingida!</strong><br>
                Você já possui os recursos necessários para concluir o Fractal God.
            `;

            return;
        }

        document.getElementById('timeResult').innerText =
            `${daysRemaining} dias (~${weeks} semanas)`;

        document.getElementById('missingResources').innerHTML = `
            <strong>Recursos restantes até Fractal God:</strong><br><br>

            • <strong>${missingPristine.toLocaleString()}</strong>
            Pristine Fractal Relics<br>

            • <strong>${missingRelics.toLocaleString()}</strong>
            Fractal Relics<br>

            • <strong>${missingMatrices.toLocaleString()}</strong>
            Integrated Fractal Matrices<br>

            <br>

            <small style="color: var(--text-secondary); display:block; font-size:12px; line-height:1.4;">
                O cálculo usa os custos reais acumulados da progressão oficial
                de Fractal God.
            </small>
        `;
    }

    calculate();
</script>
