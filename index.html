<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calculadora Fractal God - GW2</title>

    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --primary: #e5a93c;
            --text: #ffffff;
            --text-secondary: #a0a0b2;
            --border: #29292e;
            --tier-bg: #222226;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 24px rgba(0,0,0,0.45);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 30px;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 13px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .result-box {
            margin-top: 30px;
            padding: 22px;
            border-radius: 10px;
            border: 1px solid var(--primary);
            background: rgba(229, 169, 60, 0.08);
        }

        .result-box h2 {
            margin-top: 0;
            text-align: center;
            font-size: 16px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .time-highlight {
            text-align: center;
            font-size: 38px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .details {
            border-radius: 8px;
            line-height: 1.8;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .tier-card {
            background: var(--tier-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 12px;
        }

        .tier-card.completed {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.05);
        }

        .tier-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: var(--text);
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
            margin-bottom: 8px;
        }

        .tier-header .status {
            color: var(--primary);
        }

        .tier-card.completed .tier-header .status {
            color: #22c55e;
        }

        .resource {
            color: var(--text);
            font-weight: bold;
        }

        small {
            display: block;
            margin-top: 15px;
            line-height: 1.5;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Fractal God Timeline</h1>

    <div class="subtitle">
        Cálculo passo a passo baseado na progressão linear de upgrades da Wiki de GW2
    </div>

    <!-- Título Atual -->
    <div class="form-group">
        <label for="currentTitle">Seu título atual</label>
        <select id="currentTitle" oninput="calculate()">
            <option value="0">Nenhum</option>
            <option value="1">Fractal Savant</option>
            <option value="2">Fractal Prodigy</option>
            <option value="3">Fractal Champion</option>
            <option value="4">Fractal God</option>
        </select>
    </div>

    <!-- Recursos atuais -->
    <div class="grid-inputs">
        <div class="form-group">
            <label for="pristine">Pristine Fractal Relics atuais</label>
            <input type="number" id="pristine" value="0" min="0" oninput="calculate()">
        </div>
        <div class="form-group">
            <label for="relics">Fractal Relics atuais</label>
            <input type="number" id="relics" value="0" min="0" oninput="calculate()">
        </div>
    </div>

    <!-- Matrices -->
    <div class="grid-inputs">
        <div class="form-group">
            <label for="matrices">Integrated Fractal Matrices atuais</label>
            <input type="number" id="matrices" value="0" min="0" oninput="calculate()">
        </div>
        <div class="form-group">
            <label for="dailyMatrices">Integrated Matrices por dia</label>
            <input type="number" id="dailyMatrices" value="12" min="1" oninput="calculate()">
        </div>
    </div>

    <!-- Pristine diária -->
    <div class="form-group">
        <label for="dailyPristine">Pristine Fractal Relics por dia</label>
        <input type="number" id="dailyPristine" value="15" min="1" oninput="calculate()">
    </div>

    <!-- Resultado -->
    <div class="result-box">
        <h2>Tempo Total Restante até o Fractal God</h2>
        <div class="time-highlight" id="timeResult">0 dias</div>
        
        <div class="details" id="missingResources">
            <!-- Os cards de cada etapa vão surgir aqui via JavaScript -->
        </div>
    </div>

</div>

<script>
    // Custos EXATOS e INDIVIDUAIS de cada degrau de upgrade
    const tierData = [
        { level: 1, name: "Nenhum ➔ Fractal Savant",     pristine: 0,    relics: 25000,  matrices: 75  },
        { level: 2, name: "Savant ➔ Fractal Prodigy",    pristine: 1200, relics: 35000,  matrices: 150 },
        { level: 3, name: "Prodigy ➔ Fractal Champion",  pristine: 0,    relics: 45000,  matrices: 225 },
        { level: 4, name: "Champion ➔ Fractal God",     pristine: 2000, relics: 55000,  matrices: 400 }
    ];

    function calculate() {
        const currentTitle = parseInt(document.getElementById('currentTitle').value);
        
        // Clona ou armazena os recursos em tempo real que o jogador inseriu para usarmos como "carteira"
        let wallet = {
            pristine: parseInt(document.getElementById('pristine').value) || 0,
            relics: parseInt(document.getElementById('relics').value) || 0,
            matrices: parseInt(document.getElementById('matrices').value) || 0
        };

        const dailyPristine = parseInt(document.getElementById('dailyPristine').value) || 1;
        const dailyMatrices = parseInt(document.getElementById('dailyMatrices').value) || 1;

        let totalDaysRemaining = 0;
        let htmlOutput = "";

        // Varre todas as etapas da progressão sequencialmente
        for (let i = 0; i < tierData.length; i++) {
            const tier = tierData[i];

            // Se o jogador já passou desse nível, o card fica verde e zerado
            if (currentTitle >= tier.level) {
                htmlOutput += `
                    <div class="tier-card completed">
                        <div class="tier-header">
                            <span>${tier.name}</span>
                            <span class="status">✓ Concluído</span>
                        </div>
                        <div>Você já domina este tier ou passou dele!</div>
                    </div>
                `;
                continue;
            }

            // Descobre o custo líquido abatendo o que sobrou na carteira do jogador
            const neededPristine = Math.max(0, tier.pristine - wallet.pristine);
            const neededRelics = Math.max(0, tier.relics - wallet.relics);
            const neededMatrices = Math.max(0, tier.matrices - wallet.matrices);

            // Atualiza a carteira: se sobrou moedas após pagar o tier, o excesso vai pro próximo
            wallet.pristine = Math.max(0, wallet.pristine - tier.pristine);
            wallet.relics = Math.max(0, wallet.relics - tier.relics);
            wallet.matrices = Math.max(0, wallet.matrices - tier.matrices);

            // Calcula o tempo de trava temporal específico DESTA etapa isolada
            const pristineDays = Math.ceil(neededPristine / dailyPristine);
            const matrixDays = Math.ceil(neededMatrices / dailyMatrices);
            const tierDays = Math.max(pristineDays, matrixDays);

            // Acumula os dias para o cronômetro mestre lá de cima
            totalDaysRemaining += tierDays;

            // Determina qual recurso é o gargalo específico da etapa atual
            let stepGate = "Nenhum (Apenas Relics)";
            if (pristineDays > matrixDays && pristineDays > 0) stepGate = "Pristine Relics";
            else if (matrixDays > pristineDays && matrixDays > 0) stepGate = "Integrated Matrices";
            else if (pristineDays === matrixDays && pristineDays > 0) stepGate = "Pristines e Matrices";

            // Monta o visual estruturado do card parcial
            htmlOutput += `
                <div class="tier-card">
                    <div class="tier-header">
                        <span>${tier.name}</span>
                        <span class="status">${tierDays > 0 ? `+${tierDays} dias` : 'Pronto para comprar'}</span>
                    </div>
                    <strong>Falta estocar nesta etapa:</strong><br>
                    • Pristines: <span class="resource">${neededPristine.toLocaleString()}</span> | 
                    • Relics: <span class="resource">${neededRelics.toLocaleString()}</span> | 
                    • Matrices: <span class="resource">${neededMatrices.toLocaleString()}</span><br>
                    <small style="text-align: left; margin-top: 5px; color: var(--text-secondary); font-size: 12px;">
                        Gargalo desta etapa: <span style="color: var(--primary); font-weight:600;">${stepGate}</span>
                    </small>
                </div>
            `;
        }

        // Exibe o tempo macro na parte de cima
        const totalWeeks = (totalDaysRemaining / 7).toFixed(1);
        if (totalDaysRemaining === 0 && currentTitle < 4) {
            document.getElementById('timeResult').innerText = "Pronto para virar Deus!";
        } else if (currentTitle === 4) {
            document.getElementById('timeResult').innerText = "Fractal God!";
        } else {
            document.getElementById('timeResult').innerText = `${totalDaysRemaining} dias (~${totalWeeks} semanas)`;
        }

        // Injeta os cards parciais criados dinamicamente
        document.getElementById('missingResources').innerHTML = htmlOutput + `
            <small>
                *O cronômetro mestre soma os gargalos parciais considerando que você acumula os recursos em ordem linear de conquistas.
            </small>
        `;
    }

    // Executa na inicialização da página
    calculate();
</script>

</body>
</html>
