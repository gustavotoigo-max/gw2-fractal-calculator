<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calculadora Fractal God - GW2</title>

    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --primary: #e5a93c;
            --text: #ffffff;
            --text-secondary: #a0a0b2;
            --border: #29292e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 24px rgba(0,0,0,0.45);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 30px;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 13px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .result-box {
            margin-top: 30px;
            padding: 22px;
            border-radius: 10px;
            border: 1px solid var(--primary);
            background: rgba(229, 169, 60, 0.08);
        }

        .result-box h2 {
            margin-top: 0;
            text-align: center;
            font-size: 16px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .time-highlight {
            text-align: center;
            font-size: 38px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .details {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 18px;
            line-height: 1.8;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .resource {
            color: var(--text);
            font-weight: bold;
        }

        .section-title {
            color: var(--primary);
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 8px;
        }

        small {
            display: block;
            margin-top: 15px;
            line-height: 1.5;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Fractal God Timeline</h1>

    <div class="subtitle">
        Baseado nos custos oficiais da wiki do Guild Wars 2
    </div>

    <!-- Título Atual -->

    <div class="form-group">

        <label for="currentTitle">
            Seu título atual
        </label>

        <select id="currentTitle" oninput="calculate()">

            <option value="0">
                Nenhum
            </option>

            <option value="1">
                Fractal Savant
            </option>

            <option value="2">
                Fractal Prodigy
            </option>

            <option value="3">
                Fractal Champion
            </option>

            <option value="4">
                Fractal God
            </option>

        </select>

    </div>

    <!-- Recursos atuais -->

    <div class="grid-inputs">

        <div class="form-group">

            <label for="pristine">
                Pristine Fractal Relics atuais
            </label>

            <input
                type="number"
                id="pristine"
                value="0"
                min="0"
                oninput="calculate()"
            >

        </div>

        <div class="form-group">

            <label for="relics">
                Fractal Relics atuais
            </label>

            <input
                type="number"
                id="relics"
                value="0"
                min="0"
                oninput="calculate()"
            >

        </div>

    </div>

    <!-- Matrices -->

    <div class="grid-inputs">

        <div class="form-group">

            <label for="matrices">
                Integrated Fractal Matrices atuais
            </label>

            <input
                type="number"
                id="matrices"
                value="0"
                min="0"
                oninput="calculate()"
            >

        </div>

        <div class="form-group">

            <label for="dailyMatrices">
                Integrated Matrices por dia
            </label>

            <input
                type="number"
                id="dailyMatrices"
                value="12"
                min="1"
                oninput="calculate()"
            >

        </div>

    </div>

    <!-- Pristine diária -->

    <div class="form-group">

        <label for="dailyPristine">
            Pristine Fractal Relics por dia
        </label>

        <input
            type="number"
            id="dailyPristine"
            value="15"
            min="1"
            oninput="calculate()"
        >

    </div>

    <!-- Resultado -->

    <div class="result-box">

        <h2>
            Tempo estimado restante
        </h2>

        <div
            class="time-highlight"
            id="timeResult"
        >
            0 dias
        </div>

        <div
            class="details"
            id="missingResources"
        >
            Insira seus dados para calcular.
        </div>

    </div>

</div>

<script>

    // Custos RESTANTES até Fractal God
    // Baseado na wiki oficial

    const progressionData = [

        {
            level: 0,
            title: "Nenhum",
            reqPristine: 3200,
            reqRelics: 160000,
            reqMatrices: 850
        },

        {
            level: 1,
            title: "Fractal Savant",
            reqPristine: 3200,
            reqRelics: 135000,
            reqMatrices: 775
        },

        {
            level: 2,
            title: "Fractal Prodigy",
            reqPristine: 2000,
            reqRelics: 100000,
            reqMatrices: 625
        },

        {
            level: 3,
            title: "Fractal Champion",
            reqPristine: 2000,
            reqRelics: 55000,
            reqMatrices: 400
        },

        {
            level: 4,
            title: "Fractal God",
            reqPristine: 0,
            reqRelics: 0,
            reqMatrices: 0
        }
    ];

    function calculate() {

        const currentTitle =
            parseInt(
                document.getElementById('currentTitle').value
            );

        const currentPristine =
            parseInt(
                document.getElementById('pristine').value
            ) || 0;

        const currentRelics =
            parseInt(
                document.getElementById('relics').value
            ) || 0;

        const currentMatrices =
            parseInt(
                document.getElementById('matrices').value
            ) || 0;

        const dailyPristine =
            parseInt(
                document.getElementById('dailyPristine').value
            ) || 1;

        const dailyMatrices =
            parseInt(
                document.getElementById('dailyMatrices').value
            ) || 1;

        const target =
            progressionData[currentTitle];

        // Recursos faltantes

        const missingPristine =
            Math.max(
                0,
                target.reqPristine - currentPristine
            );

        const missingRelics =
            Math.max(
                0,
                target.reqRelics - currentRelics
            );

        const missingMatrices =
            Math.max(
                0,
                target.reqMatrices - currentMatrices
            );

        // Dias necessários

        const pristineDays =
            Math.ceil(
                missingPristine / dailyPristine
            );

        const matrixDays =
            Math.ceil(
                missingMatrices / dailyMatrices
            );

        // Verdadeiro gargalo

        const daysRemaining =
            Math.max(
                pristineDays,
                matrixDays
            );

        const weeks =
            (daysRemaining / 7).toFixed(1);

        // Concluído

        if (
            missingPristine === 0 &&
            missingRelics === 0 &&
            missingMatrices === 0
        ) {

            document.getElementById('timeResult').innerText =
                "Fractal God alcançado!";

            document.getElementById('missingResources').innerHTML = `
                <strong>Parabéns!</strong><br>
                Você já possui todos os recursos necessários.
            `;

            return;
        }

        // Resultado

        document.getElementById('timeResult').innerText =
            `${daysRemaining} dias (~${weeks} semanas)`;

        document.getElementById('missingResources').innerHTML = `

            <div class="section-title">
                Recursos restantes
            </div>

            • <span class="resource">
                ${missingPristine.toLocaleString()}
            </span>
            Pristine Fractal Relics

            <br>

            • <span class="resource">
                ${missingRelics.toLocaleString()}
            </span>
            Fractal Relics

            <br>

            • <span class="resource">
                ${missingMatrices.toLocaleString()}
            </span>
            Integrated Fractal Matrices

            <br><br>

            <div class="section-title">
                Gargalos de tempo
            </div>

            • Pristines:
            <span class="resource">
                ${pristineDays} dias
            </span>

            <br>

            • Matrices:
            <span class="resource">
                ${matrixDays} dias
            </span>

            <br><br>

            <div class="section-title">
                Gargalo principal
            </div>

            ${
                pristineDays > matrixDays
                ? "Pristine Fractal Relics"
                : matrixDays > pristineDays
                    ? "Integrated Fractal Matrices"
                    : "Ambos igualmente"
            }

            <small>
                O cálculo usa o maior timegate entre
                Pristine Fractal Relics e Integrated Fractal Matrices.
            </small>
        `;
    }

    calculate();

</script>

</body>
</html>
