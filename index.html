<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GW2 Fractal Materials Checker</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --accent-color: #e67e22;
            --border-radius: 8px;
            --success-color: #2ecc71;
            --error-color: #c0392b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 25px;
            font-size: 24px;
        }

        h3 {
            border-bottom: 1px solid #444;
            padding-bottom: 6px;
            margin-top: 25px;
            color: var(--accent-color);
            font-size: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .api-section {
            background-color: #222;
            padding: 15px;
            border-radius: var(--border-radius);
            border: 1px solid #444;
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
            font-size: 14px;
        }

        input[type="text"], input[type="number"] {
            padding: 12px;
            border-radius: var(--border-radius);
            border: 1px solid #444;
            background-color: #111;
            color: #fff;
            font-size: 14px;
            box-sizing: border-box;
            width: 100%;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            padding: 12px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #d35400;
        }

        .loading {
            display: none;
            text-align: center;
            font-style: italic;
            color: #aaa;
            margin: 15px 0;
        }

        .error {
            display: none;
            background-color: var(--error-color);
            color: white;
            padding: 12px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            font-size: 14px;
            word-break: break-word;
        }

        .results {
            margin-top: 25px;
            border-top: 1px solid #444;
            padding-top: 10px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #383838;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .item-name {
            font-weight: 500;
        }

        .item-count {
            font-size: 18px;
            font-weight: bold;
            color: var(--success-color);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>GW2 Fractal Tracker</h1>
    
    <div class="api-section">
        <div class="form-group" style="margin-bottom: 0;">
            <label for="apiKey">Sincronizar Conta via API Key:</label>
            <input type="text" id="apiKey" placeholder="AAAAAAA-BBBB-CCCC-DDDD-EEEEEEEEEEEE...">
            <button style="margin-top: 5px;" onclick="fetchFractalData()">Consultar e Sincronizar</button>
        </div>
    </div>

    <div id="loading" class="loading">Buscando dados na Tyria via Vercel...</div>
    <div id="error" class="error"></div>

    <div id="results" class="results">
        <h3>Inventário Atual Sincronizado</h3>
        
        <div class="grid-inputs">
            <div class="form-group">
                <label for="pristine">Pristine Fractal Relics</label>
                <input type="number" id="pristine" value="0" min="0">
            </div>
            <div class="form-group">
                <label for="relics">Fractal Relics Normais</label>
                <input type="number" id="relics" value="0" min="0">
            </div>
        </div>
        
        <div class="form-group">
            <label for="matrices">Integrated Fractal Matrices (Banco)</label>
            <input type="number" id="matrices" value="0" min="0">
        </div>
    </div>
</div>

<script>
    async function fetchFractalData() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');

        errorDiv.style.display = 'none';
        
        if (!apiKey) {
            showError('Por favor, insira uma API Key.');
            return;
        }

        loadingDiv.style.display = 'block';

        try {
            // Conversando com o seu backend oculto na Vercel
            const response = await fetch('/api/consultar', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ apiKey: apiKey })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Erro desconhecido no servidor.');
            }

            // Injeta as informações retornadas direto nos campos numéricos estruturados
            document.getElementById('relics').value = data.fractalRelics;
            document.getElementById('pristine').value = data.pristineRelics;
            document.getElementById('matrices').value = data.integratedMatrices;

        } catch (err) {
            showError(err.message);
        } finally {
            loadingDiv.style.display = 'none';
        }
    }

    function showError(message) {
        const errorDiv = document.getElementById('error');
        errorDiv.innerText = message;
        errorDiv.style.display = 'block';
    }
</script>
</body>
</html>
