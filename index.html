<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Fractal God - GW2</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --primary: #e5a93c;
            --text: #ffffff;
            --text-secondary: #a0a0b2;
            --border: #29292e;
            --tier-bg: #222226;
            --error-bg: #c0392b;
            --success: #2ecc71;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
        }
        .container { 
            width: 100%; 
            max-width: 700px; 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            box-shadow: 0 8px 24px rgba(0,0,0,0.45); 
            position: relative; 
        }
        .language-picker { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            width: auto; 
            padding: 6px 10px; 
            font-size: 14px; 
            background: var(--bg-color); 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            color: var(--text); 
            cursor: pointer; 
        }
        h1 { 
            text-align: center; 
            color: var(--primary); 
            margin-bottom: 8px; 
            font-size: 30px; 
            letter-spacing: 1px; 
            padding-top: 15px; 
        }
        .subtitle { 
            text-align: center; 
            color: var(--text-secondary); 
            margin-bottom: 30px; 
            font-size: 13px; 
        }
        h3 { 
            color: var(--primary); 
            font-size: 16px; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 6px; 
            margin-top: 25px; 
            margin-bottom: 15px; 
        }
        .form-group { 
            margin-bottom: 20px; 
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 14px; 
            font-weight: 600; 
            color: var(--text-secondary); 
        }
        input, select { 
            width: 100%; 
            padding: 12px; 
            background: var(--bg-color); 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            color: var(--text); 
            font-size: 16px; 
            box-sizing: border-box; 
        }
        input:focus, select:focus { 
            outline: none; 
            border-color: var(--primary); 
        }
        
        .api-box { 
            background: #111113; 
            border: 1px dashed var(--primary); 
            padding: 18px; 
            border-radius: 8px; 
            margin-bottom: 25px; 
        }
        .api-btn { 
            width: 100%; 
            padding: 12px; 
            background: var(--primary); 
            color: #000; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: opacity 0.2s; 
        }
        .api-btn:hover { 
            opacity: 0.9; 
        }
        .api-status { 
            display: none; 
            text-align: center; 
            font-size: 13px; 
            font-style: italic; 
            margin-top: 8px; 
            color: var(--text-secondary); 
        }
        .api-error { 
            display: none; 
            background: var(--error-bg); 
            color: #fff; 
            padding: 10px; 
            border-radius: 6px; 
            font-size: 13px; 
            margin-top: 10px; 
            text-align: center; 
        }

        .grid-inputs { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }
        .farm-section { 
            background: var(--tier-bg); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 18px; 
            margin-bottom: 25px; 
        }
        .checkbox-group { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 10px; 
            margin-bottom: 15px; 
        }
        @media(min-width: 480px) { 
            .checkbox-group { grid-template-columns: 1fr 1fr; } 
            h1 { padding-top: 0; } 
        }
        .checkbox-item { 
            display: flex; 
            align-items: center; 
            background: var(--bg-color); 
            padding: 10px 14px; 
            border-radius: 6px; 
            border: 1px solid var(--border); 
            cursor: pointer; 
        }
        .checkbox-item input { 
            width: auto; 
            margin-right: 12px; 
            transform: scale(1.2); 
            accent-color: var(--primary); 
        }
        .checkbox-item span { 
            font-size: 14px; 
            color: var(--text); 
        }
        .checkbox-item .desc { 
            font-size: 11px; 
            color: var(--text-secondary); 
            display: block; 
            margin-top: 2px; 
        }
        .sub-group-title { 
            font-size: 12px; 
            text-transform: uppercase; 
            color: var(--primary); 
            font-weight: bold; 
            margin-top: 10px; 
            margin-bottom: 8px; 
            grid-column: 1 / -1; 
        }
        
        .result-box { 
            margin-top: 30px; 
            padding: 22px; 
            border-radius: 10px; 
            border: 1px solid var(--primary); 
            background: rgba(229, 169, 60, 0.08); 
        }
        .result-box h2 { 
            margin-top: 0; 
            text-align: center; 
            font-size: 16px; 
            color: var(--text-secondary); 
            text-transform: uppercase; 
        }
        .time-highlight { 
            text-align: center; 
            font-size: 38px; 
            font-weight: bold; 
            color: var(--primary); 
            margin-bottom: 20px; 
        }
        .details { 
            border-radius: 8px; 
            line-height: 1.8; 
            color: var(--text-secondary); 
            font-size: 14px; 
        }
        small { 
            display: block; 
            margin-top: 15px; 
            line-height: 1.5; 
            text-align: center; 
        }

        /* --- ESTILOS COMPATÍVEIS COM O RETORNO DA API --- */
        .tier-card { 
            background: var(--bg-color); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 15px; 
            margin-bottom: 12px; 
            line-height: 1.6; 
            text-align: left; 
        }
        .tier-card.completed { 
            border-color: rgba(46, 204, 113, 0.3); 
            background: rgba(46, 204, 113, 0.02); 
            color: var(--text-secondary); 
        }
        .tier-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-weight: bold; 
            font-size: 15px; 
            color: var(--text); 
            margin-bottom: 8px; 
            border-bottom: 1px dashed var(--border); 
            padding-bottom: 6px; 
        }
        .tier-card.completed .tier-header { 
            color: var(--success); 
        }
        .status { 
            font-size: 13px; 
            color: var(--primary); 
            background: rgba(229, 169, 60, 0.12); 
            padding: 3px 8px; 
            border-radius: 4px; 
            font-weight: 600; 
        }
        .tier-card.completed .status { 
            color: var(--success); 
            background: rgba(46, 204, 113, 0.12); 
        }
        .resource { 
            color: var(--text); 
            font-weight: 600; 
        }
    </style>
</head>
<body>

    <div class="container">
        <select id="langPicker" class="language-picker">
            <option value="pt">🇧🇷 Português</option>
            <option value="en">🇺🇸 English</option>
        </select>

        <h1 id="lblMainTitle">Fractal God Timeline</h1>
        <div class="subtitle" id="lblSubtitle">Cálculo baseado nos valores exatos de drops e conversões da sua planilha</div>

        <div class="api-box">
            <label for="apiKey" id="lblApiKey">Sincronizar Conta via GW2 API Key:</label>
            <input type="text" id="apiKey" placeholder="AAAAAAA-BBBB-CCCC-DDDD-EEEEEEEEEEEE...">
            <button class="api-btn" id="btnSync">Sincronizar Inventário</button>
            <div id="apiStatus" class="api-status">Buscando dados na Tyria...</div>
            <div id="apiError" class="api-error"></div>
        </div>

        <div class="form-group">
            <label for="currentTitle" id="lblCurrentTitle">Seu título atual</label>
            <select id="currentTitle">
                <option value="0" id="optNone">Nenhum</option>
                <option value="1">Fractal Savant</option>
                <option value="2">Fractal Prodigy</option>
                <option value="3">Fractal Champion</option>
                <option value="4">Fractal God</option>
            </select>
        </div>

        <h3 id="lblSectionInventory">Seu Inventário Atual</h3>
        <div class="grid-inputs">
            <div class="form-group">
                <label for="pristine" id="lblPristineCart">Pristine Fractal Relics atuais</label>
                <input type="number" id="pristine" value="0" min="0">
            </div>
            <div class="form-group">
                <label for="relics" id="lblRelicsCart">Fractal Relics atuais</label>
                <input type="number" id="relics" value="0" min="0">
            </div>
        </div>
        <div class="form-group">
            <label for="matrices" id="lblMatricesCart">Integrated Fractal Matrices atuais</label>
            <input type="number" id="matrices" value="0" min="0">
        </div>

        <h3 id="lblSectionRoutine">Sua Rotina Diária de Farm</h3>
        <div class="farm-section">
            <div class="checkbox-group">
                <div class="sub-group-title" id="lblSubDailies">Dailies Padrão</div>
                <label class="checkbox-item">
                    <input type="checkbox" id="farmT4" checked>
                    <div>
                        <span>Fractals T4</span>
                        <span class="desc">+12 Pristines | +174 Relics</span>
                    </div>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="farmRecs" checked>
                    <div>
                        <span id="lblRecsCheck">Recomendadas (Recs)</span>
                        <span class="desc">+3 Pristines | +36 Relics</span>
                    </div>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="farmPotions" checked>
                    <div>
                        <span>Extra Potions Melt</span>
                        <span class="desc">+0 Pristines | +16 Relics</span>
                    </div>
                </label>

                <div class="sub-group-title" id="lblSubCMs">Challenge Modes (CMs)</div>
                <label class="checkbox-item">
                    <input type="checkbox" id="cmKinfall" checked>
                    <div>
                        <span>95 - Kanaxai (Silent Surf)</span>
                        <span class="desc">+2 Pristines | +1 Matrix | +119 Relics</span>
                    </div>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="cmNightmare" checked>
                    <div>
                        <span>96 - Nightmare</span>
                        <span class="desc">+2 Pristines | +1 Matrix | +159 Relics</span>
                    </div>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="cmShattered" checked>
                    <div>
                        <span>97 - Shattered Obs.</span>
                        <span class="desc">+2 Pristines | +1 Matrix | +159 Relics</span>
                    </div>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="cmSunqua" checked>
                    <div>
                        <span>98 - Sunqua Peak</span>
                        <span class="desc">+2 Pristines | +1 Matrix | +139 Relics</span>
                    </div>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="cmSilent" checked>
                    <div>
                        <span>99 - Silent Surf</span>
                        <span class="desc">+2 Pristines | +1 Matrix | +119 Relics</span>
                    </div>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="cmLonely" checked>
                    <div>
                        <span>100 - Lonely Tower</span>
                        <span class="desc">+2 Pristines | +1 Matrix | +139 Relics</span>
                    </div>
                </label>
            </div>
        </div>

        <h3 id="lblSectionGains">Ganhos Diários Calculados (Dados Reais)</h3>
        <div class="grid-inputs">
            <div class="form-group">
                <label for="dailyPristine" id="lblPristineDay">Pristine Relics / dia</label>
                <input type="number" id="dailyPristine" value="27" min="0">
            </div>
            <div class="form-group">
                <label for="dailyMatrices" id="lblMatricesDay">Integrated Matrices / dia</label>
                <input type="number" id="dailyMatrices" value="6" min="0">
            </div>
        </div>
        <div class="form-group">
            <label for="dailyRelics" id="lblRelicsDay">Fractal Relics Normais / dia (Garantidos + Conversões)</label>
            <input type="number" id="dailyRelics" value="1060" min="0">
        </div>

        <div class="result-box">
            <h2 id="lblResultTitle">Tempo Total Restante até o Fractal God</h2>
            <div class="time-highlight" id="timeResult">0 dias</div>
            <div class="details" id="missingResources"></div>
        </div>
    </div>

    <script>
        const SITE_VERSION = "v2.2.0"; 
        const USER_NICK    = "Nahar.5349";       
        const USER_EMAIL   = "gustavo.toigo@gmail.com";     

        const translations = {
            pt: {
                mainTitle: "Fractal God Timeline", subtitle: "Cálculo baseado nos valores exatos de drops e conversões da sua planilha",
                currentTitle: "Seu título atual", none: "Nenhum", secInventory: "Seu Inventário Atual", pristineCart: "Pristine Fractal Relics atuais", relicsCart: "Fractal Relics atuais", matricesCart: "Integrated Fractal Matrices atuais", secRoutine: "Sua Rotina Diária de Farm", subDailies: "Dailies Padrão", recsCheck: "Recomendadas (Recs)", subCMs: "Challenge Modes (CMs)", secGains: "Ganhos Diários Calculados (Dados Reais)", pristineDay: "Pristine Relics / dia", matricesDay: "Integrated Matrices / dia", relicsDay: "Fractal Relics Normais / dia (Garantidos + Conversões)", resultTitle: "Tempo Total Restante até o Fractal God",
                lblCompleted: "✓ Concluído", lblAlreadyDone: "Você já domina este tier ou passou dele!", lblNeedStock: "Falta estocar nesta etapa:", lblGate: "Gargalo desta etapa:", lblReadyBuy: "Pronto para comprar", lblInfDays: "Infinitos dias (Sem farm ativo)", lblNoFarmActive: "Falta ativar uma fonte de farm!", lblGateNone: "Nenhum", lblGateReady: "Nenhum (Pronto!)", lblGateNormal: "Fractal Relics Normais", lblGateBoth: "Pristines e Matrices", lblGatePristine: "Pristine Relics", lblGateMatrix: "Integrated Matrices", lblReadyGod: "Pronto para virar Deus!", lblIsGod: "Fractal God!", lblUnfTime: "Tempo Indeterminado", lblDays: "dias", lblWeeks: "semanas",
                lblFootnote: "*O cronômetro mestre soma os gargalos parciais considerando que você acumula os recursos em ordem linear de conquistas.", lblDevBy: "Desenvolvido por:",
                apiKey: "Sincronizar Conta via GW2 API Key:", btnSync: "Sincronizar Inventário", apiLoading: "Buscando dados na Tyria..."
            },
            en: {
                mainTitle: "Fractal God Timeline", subtitle: "Calculation based on exact drop values and conversions from your spreadsheet",
                currentTitle: "Your current title", none: "None", secInventory: "Your Current Inventory", pristineCart: "Current Pristine Fractal Relics", relicsCart: "Current Fractal Relics", matricesCart: "Current Integrated Fractal Matrices", secRoutine: "Your Daily Farm Routine", subDailies: "Standard Dailies", recsCheck: "Recommended (Recs)", subCMs: "Challenge Modes (CMs)", secGains: "Calculated Daily Earnings (Real Data)", pristineDay: "Pristine Relics / day", matricesDay: "Integrated Matrices / day", relicsDay: "Normal Fractal Relics / day (Guaranteed + Melt)", resultTitle: "Total Time Remaining until Fractal God",
                lblCompleted: "✓ Completed", lblAlreadyDone: "You already own this tier or have passed it!", lblNeedStock: "Missing resources in this step:", lblGate: "Bottleneck of this step:", lblReadyBuy: "Ready to buy", lblInfDays: "Infinite days (No active farm)", lblNoFarmActive: "You need to activate a farm source!", lblGateNone: "None", lblGateReady: "None (Ready!)", lblGateNormal: "Normal Fractal Relics", lblGateBoth: "Pristines and Matrices", lblGatePristine: "Pristine Relics", lblGateMatrix: "Integrated Matrices", lblReadyGod: "Ready to become God!", lblIsGod: "Fractal God!", lblUnfTime: "Undetermined Time", lblDays: "days", lblWeeks: "weeks",
                lblFootnote: "*The master timer sums the partial bottlenecks assuming you accumulate resources in a linear order of achievements.", lblDevBy: "Developed by:",
                apiKey: "Sync Account via GW2 API Key:", btnSync: "Sync Inventory", apiLoading: "Fetching data from Tyria..."
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            updateDailyInputs();
            changeLanguage();

            document.getElementById('btnSync').addEventListener('click', fetchFractalData);
            document.getElementById('langPicker').addEventListener('change', changeLanguage);

            const inputsCalculo = ['currentTitle', 'pristine', 'relics', 'matrices', 'dailyPristine', 'dailyMatrices', 'dailyRelics'];
            inputsCalculo.forEach(id => {
                document.getElementById(id).addEventListener('input', calculate);
            });

            const checkboxesFarm = ['farmT4', 'farmRecs', 'farmPotions', 'cmKinfall', 'cmNightmare', 'cmShattered', 'cmSunqua', 'cmSilent', 'cmLonely'];
            checkboxesFarm.forEach(id => {
                document.getElementById(id).addEventListener('change', updateDailyInputs);
            });
        });

        function changeLanguage() {
            const lang = document.getElementById('langPicker').value;
            const text = translations[lang] || translations['pt'];

            document.getElementById('lblMainTitle').innerText = text.mainTitle;
            document.getElementById('lblSubtitle').innerHTML = text.subtitle;
            document.getElementById('lblCurrentTitle').innerText = text.currentTitle;
            document.getElementById('optNone').innerText = text.none;
            document.getElementById('lblSectionInventory').innerText = text.secInventory;
            document.getElementById('lblPristineCart').innerText = text.pristineCart;
            document.getElementById('lblRelicsCart').innerText = text.relicsCart;
            document.getElementById('lblMatricesCart').innerText = text.matricesCart;
            document.getElementById('lblSectionRoutine').innerText = text.secRoutine;
            document.getElementById('lblSubDailies').innerText = text.subDailies;
            document.getElementById('lblRecsCheck').innerText = text.recsCheck;
            document.getElementById('lblSubCMs').innerText = text.subCMs;
            document.getElementById('lblSectionGains').innerText = text.secGains;
            document.getElementById('lblPristineDay').innerText = text.pristineDay;
            document.getElementById('lblMatricesDay').innerText = text.matricesDay;
            document.getElementById('lblRelicsDay').innerText = text.relicsDay;
            document.getElementById('lblResultTitle').innerText = text.resultTitle;
            document.getElementById('lblApiKey').innerText = text.apiKey;
            document.getElementById('btnSync').innerText = text.btnSync;

            calculate();
        }

        // A função deve ser específica na atribuição para evitar sobreposição
async function fetchFractalData() {
    console.log("Iniciando busca na API...");
    const apiKey = document.getElementById('apiKey').value.trim();
    const errorDiv = document.getElementById('apiError');

    if (!apiKey) return;

    try {
        const [walletRes, materialsRes, achRes] = await Promise.all([
            fetch(`https://api.guildwars2.com/v2/account/wallet?access_token=${apiKey}`),
            fetch(`https://api.guildwars2.com/v2/account/materials?access_token=${apiKey}`)
        ]);

        // Buscamos os achievements em separado para não travar o restante
        const achResRaw = await fetch(`https://api.guildwars2.com/v2/account/achievements?access_token=${apiKey}`);
        
        const walletData = await walletRes.json();
        const materialsData = await materialsRes.json();
        const achData = await achResRaw.json();

        // 1. Atualização de Valores Numéricos (IDs corretos)
        const pristineObj = walletData.find(i => i.id === 24);
        const relicObj = walletData.find(i => i.id === 7);
        const matrixObj = materialsData.find(i => i.id === 79230);

        document.getElementById('pristine').value = pristineObj ? pristineObj.value : 0;
        document.getElementById('relics').value = relicObj ? relicObj.value : 0;
        document.getElementById('matrices').value = matrixObj ? (matrixObj.count || 0) : 0;

        // 2. Atualização do Título (ID 2167)
        const mistAttunement = achData.find(a => a.id === 2167);
        const elTitle = document.getElementById('currentTitle');

        if (elTitle && mistAttunement) {
            const valorParaSelecionar = String(mistAttunement.current);
            
            // 1. Muda o valor
            elTitle.value = valorParaSelecionar;
            
            // 2. Dispara o evento
            elTitle.dispatchEvent(new Event('change', { bubbles: true }));
            
            console.log("Título alterado via script para:", valorParaSelecionar);
            
            // 3. O SEGREDO: Damos 50ms para o DOM processar a alteração antes de calcular
            setTimeout(() => {
                console.log("Executando cálculo após atualização do título...");
                calculate();
            }, 50);
        } else {
    // Se não encontrou o título, calcula direto
    calculate();
}
        console.log("Busca concluída. Chamando calculate()...");
        // O calculate() já é chamado automaticamente pelo evento 'change' disparado acima
        // ou você pode chamá-lo manualmente aqui:
        calculate();

    } catch (err) {
        console.error("Erro crítico:", err);
        if (errorDiv) {
            errorDiv.innerText = "Erro ao buscar dados.";
            errorDiv.style.display = 'block';
        }
    }
}
        function updateDailyInputs() {
            let pristineSum = 0; let matrixSum = 0; let relicsSum = 0;
            if (document.getElementById('farmT4').checked) { pristineSum += 12; relicsSum += 174; }
            if (document.getElementById('farmRecs').checked) { pristineSum += 3; relicsSum += 36; }
            if (document.getElementById('farmPotions').checked) { relicsSum += 16; }
            if (document.getElementById('cmKinfall').checked)   { pristineSum += 2; matrixSum += 1; relicsSum += 119; } 
            if (document.getElementById('cmNightmare').checked) { pristineSum += 2; matrixSum += 1; relicsSum += 159; } 
            if (document.getElementById('cmShattered').checked) { pristineSum += 2; matrixSum += 1; relicsSum += 159; } 
            if (document.getElementById('cmSunqua').checked)    { pristineSum += 2; matrixSum += 1; relicsSum += 139; } 
            if (document.getElementById('cmSilent').checked)    { pristineSum += 2; matrixSum += 1; relicsSum += 119; } 
            if (document.getElementById('cmLonely').checked)    { pristineSum += 2; matrixSum += 1; relicsSum += 139; } 

            document.getElementById('dailyPristine').value = pristineSum;
            document.getElementById('dailyMatrices').value = matrixSum;
            document.getElementById('dailyRelics').value = relicsSum;
            calculate();
        }

        async function calculate() {
            const lang = document.getElementById('langPicker').value;
            const text = translations[lang] || translations['pt'];
            const currentTitle = parseInt(document.getElementById('currentTitle').value);

            const payload = {
                currentTitle,
                pristine: parseInt(document.getElementById('pristine').value) || 0,
                relics: parseInt(document.getElementById('relics').value) || 0,
                matrices: parseInt(document.getElementById('matrices').value) || 0,
                dailyPristine: parseInt(document.getElementById('dailyPristine').value) || 0,
                dailyMatrices: parseInt(document.getElementById('dailyMatrices').value) || 0,
                dailyRelics: parseInt(document.getElementById('dailyRelics').value) || 0
            };

            try {
                const res = await fetch('/api/calcular', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!res.ok) return;
                const data = await res.json();

                let finalHtml = data.htmlOutput
                    .replaceAll('__LBL_COMPLETED__', text.lblCompleted)
                    .replaceAll('__LBL_ALREADY_DONE__', text.lblAlreadyDone)
                    .replaceAll('__LBL_NEED_STOCK__', text.lblNeedStock)
                    .replaceAll('__LBL_GATE__', text.lblGate)
                    .replaceAll('__GATE_NONE__', text.lblGateNone)
                    .replaceAll('__GATE_READY__', text.lblGateReady)
                    .replaceAll('__GATE_NORMAL__', text.lblGateNormal)
                    .replaceAll('__GATE_BOTH__', text.lblGateBoth)
                    .replaceAll('__GATE_PRISTINE__', text.lblGatePristine)
                    .replaceAll('__GATE_MATRIX__', text.lblGateMatrix)
                    .replaceAll('__LBL_DAYS__', text.lblDays)
                    .replaceAll('__LBL_INF_DAYS__', text.lblInfDays)
                    .replaceAll('__LBL_NO_FARM__', text.lblNoFarmActive)
                    .replaceAll('__LBL_READY_BUY__', text.lblReadyBuy);

                const totalDays = data.totalDaysRemaining;
                const totalWeeks = (totalDays / 7).toFixed(1);

                if (totalDays === 0 && currentTitle < 4) {
                    document.getElementById('timeResult').innerText = text.lblReadyGod;
                } else if (currentTitle === 4) {
                    document.getElementById('timeResult').innerText = text.lblIsGod;
                } else if (totalDays === Infinity || isNaN(totalDays)) {
                    document.getElementById('timeResult').innerText = text.lblUnfTime;
                } else {
                    document.getElementById('timeResult').innerText = `${totalDays} ${text.lblDays} (~${totalWeeks} ${text.lblWeeks})`;
                }

                document.getElementById('missingResources').innerHTML = finalHtml + `
                    <small>${text.lblFootnote}</small>
                    <div style="text-align: center; margin-top: 25px; font-size: 10px; color: var(--text-secondary); opacity: 0.4; letter-spacing: 0.5px; line-height: 1.5;">
                        <div>${SITE_VERSION}</div>
                        <div style="margin-top: 4px;">${text.lblDevBy} <strong>${USER_NICK}</strong> (${USER_EMAIL})</div>
                    </div>
                `;
            } catch(e) {
                console.error("Erro na comunicação com o backend.", e);
            }
        }
    </script>
</body>
</html>
