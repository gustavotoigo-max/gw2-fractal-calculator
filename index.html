<script>
    const SITE_VERSION = "v2.2.0"; 
    const USER_NICK    = "SeuNickAqui";       
    const USER_EMAIL   = "seu@email.com";     

    const translations = {
        pt: {
            mainTitle: "Fractal God Timeline", subtitle: "Cálculo baseado nos valores exatos de drops e conversões da sua planilha",
            currentTitle: "Seu título atual", none: "Nenhum", secInventory: "Seu Inventário Atual", pristineCart: "Pristine Fractal Relics atuais", relicsCart: "Fractal Relics atuais", matricesCart: "Integrated Fractal Matrices atuais", secRoutine: "Sua Rotina Diária de Farm", subDailies: "Dailies Padrão", recsCheck: "Recomendadas (Recs)", subCMs: "Challenge Modes (CMs)", secGains: "Ganhos Diários Calculados (Dados Reais)", pristineDay: "Pristine Relics / dia", matricesDay: "Integrated Matrices / dia", relicsDay: "Fractal Relics Normais / dia (Garantidos + Conversões)", resultTitle: "Tempo Total Restante até o Fractal God",
            lblCompleted: "✓ Concluído", lblAlreadyDone: "Você já domina este tier ou passou dele!", lblNeedStock: "Falta estocar nesta etapa:", lblGate: "Gargalo desta etapa:", lblReadyBuy: "Pronto para comprar", lblInfDays: "Infinitos dias (Sem farm ativo)", lblNoFarmActive: "Falta ativar uma fonte de farm!", lblGateNone: "Nenhum", lblGateReady: "Nenhum (Pronto!)", lblGateNormal: "Fractal Relics Normais", lblGateBoth: "Pristines e Matrices", lblGatePristine: "Pristine Relics", lblGateMatrix: "Integrated Matrices", lblReadyGod: "Pronto para virar Deus!", lblIsGod: "Fractal God!", lblUnfTime: "Tempo Indeterminado", lblDays: "dias", lblWeeks: "semanas",
            lblFootnote: "*O cronômetro mestre soma os gargalos parciais considerando que você acumula os recursos em ordem linear de conquistas.", lblDevBy: "Desenvolvido por:",
            apiKey: "Sincronizar Conta via GW2 API Key:", btnSync: "Sincronizar Inventário", apiLoading: "Buscando dados na Tyria..."
        },
        en: {
            mainTitle: "Fractal God Timeline", subtitle: "Calculation based on exact drop values and conversions from your spreadsheet",
            currentTitle: "Your current title", none: "None", secInventory: "Your Current Inventory", pristineCart: "Current Pristine Fractal Relics", relicsCart: "Current Fractal Relics", matricesCart: "Current Integrated Fractal Matrices", secRoutine: "Your Daily Farm Routine", subDailies: "Standard Dailies", recsCheck: "Recommended (Recs)", subCMs: "Challenge Modes (CMs)", secGains: "Calculated Daily Earnings (Real Data)", pristineDay: "Pristine Relics / day", matricesDay: "Integrated Matrices / day", relicsDay: "Normal Fractal Relics / day (Guaranteed + Melt)", resultTitle: "Total Time Remaining until Fractal God",
            lblCompleted: "✓ Completed", lblAlreadyDone: "You already own this tier or have passed it!", lblNeedStock: "Missing resources in this step:", lblGate: "Bottleneck of this step:", lblReadyBuy: "Ready to buy", lblInfDays: "Infinite days (No active farm)", lblNoFarmActive: "You need to activate a farm source!", lblGateNone: "None", lblGateReady: "None (Ready!)", lblGateNormal: "Normal Fractal Relics", lblGateBoth: "Pristines and Matrices", lblGatePristine: "Pristine Relics", lblGateMatrix: "Integrated Matrices", lblReadyGod: "Ready to become God!", lblIsGod: "Fractal God!", lblUnfTime: "Undetermined Time", lblDays: "days", lblWeeks: "weeks",
            lblFootnote: "*The master timer sums the partial bottlenecks assuming you accumulate resources in a linear order of achievements.", lblDevBy: "Developed by:",
            apiKey: "Sync Account via GW2 API Key:", btnSync: "Sync Inventory", apiLoading: "Fetching data from Tyria..."
        }
    };

    window.addEventListener('DOMContentLoaded', () => {
        updateDailyInputs();
        changeLanguage();

        document.getElementById('btnSync').addEventListener('click', fetchFractalData);
        document.getElementById('langPicker').addEventListener('change', changeLanguage);

        const inputsCalculo = ['currentTitle', 'pristine', 'relics', 'matrices', 'dailyPristine', 'dailyMatrices', 'dailyRelics'];
        inputsCalculo.forEach(id => {
            document.getElementById(id).addEventListener('input', calculate);
        });

        const checkboxesFarm = ['farmT4', 'farmRecs', 'farmPotions', 'cmKinfall', 'cmNightmare', 'cmShattered', 'cmSunqua', 'cmSilent', 'cmLonely'];
        checkboxesFarm.forEach(id => {
            document.getElementById(id).addEventListener('change', updateDailyInputs);
        });
    });

    function changeLanguage() {
        const lang = document.getElementById('langPicker').value;
        const text = translations[lang] || translations['pt'];

        document.getElementById('lblMainTitle').innerText = text.mainTitle;
        document.getElementById('lblSubtitle').innerHTML = text.subtitle;
        document.getElementById('lblCurrentTitle').innerText = text.currentTitle;
        document.getElementById('optNone').innerText = text.none;
        document.getElementById('lblSectionInventory').innerText = text.secInventory;
        document.getElementById('lblPristineCart').innerText = text.pristineCart;
        document.getElementById('lblRelicsCart').innerText = text.relicsCart;
        document.getElementById('lblMatricesCart').innerText = text.matricesCart;
        document.getElementById('lblSectionRoutine').innerText = text.secRoutine;
        document.getElementById('lblSubDailies').innerText = text.subDailies;
        document.getElementById('lblRecsCheck').innerText = text.recsCheck;
        document.getElementById('lblSubCMs').innerText = text.subCMs;
        document.getElementById('lblSectionGains').innerText = text.secGains;
        document.getElementById('lblPristineDay').innerText = text.pristineDay;
        document.getElementById('lblMatricesDay').innerText = text.matricesDay;
        document.getElementById('lblRelicsDay').innerText = text.relicsDay;
        document.getElementById('lblResultTitle').innerText = text.resultTitle;
        document.getElementById('lblApiKey').innerText = text.apiKey;
        document.getElementById('btnSync').innerText = text.btnSync;

        calculate();
    }

    async function fetchFractalData() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const statusDiv = document.getElementById('apiStatus');
        const errorDiv = document.getElementById('apiError');
        const lang = document.getElementById('langPicker').value;
        const text = translations[lang] || translations['pt'];

        errorDiv.style.display = 'none';
        if (!apiKey) {
            errorDiv.innerText = lang === 'pt' ? 'Por favor, insira uma API Key.' : 'Please enter an API Key.';
            errorDiv.style.display = 'block';
            return;
        }

        statusDiv.innerText = text.apiLoading;
        statusDiv.style.display = 'block';

        try {
            const walletUrl = `https://api.guildwars2.com/v2/account/wallet?access_token=${apiKey}`;
            const bankUrl = `https://api.guildwars2.com/v2/account/bank?access_token=${apiKey}`;

            const [walletResponse, bankResponse] = await Promise.all([
                fetch(walletUrl),
                fetch(bankUrl)
            ]);

            if (walletResponse.status === 403 || bankResponse.status === 403) {
                throw new Error(lang === 'pt' ? 
                    'Chave inválida ou sem permissão. Garanta que sua API key tenha as permissões "account", "wallet" e "inventories" marcadas.' : 
                    'Invalid or unpermitted key. Ensure your API key has "account", "wallet", and "inventories" permissions enabled.');
            }

            if (!walletResponse.ok || !bankResponse.ok) {
                throw new Error(`API Error (Wallet: ${walletResponse.status} | Bank: ${bankResponse.status})`);
            }

            const walletData = await walletResponse.json();
            const bankData = await bankResponse.json();

            let fractalRelics = 0;
            let pristineRelics = 0;

            const FRACTAL_RELIC_ID = 7;
            const PRISTINE_RELIC_ID = 24;
            const INTEGRATED_MATRIX_ID = 73248;

            walletData.forEach(currency => {
                if (currency.id === FRACTAL_RELIC_ID) fractalRelics = currency.value;
                if (currency.id === PRISTINE_RELIC_ID) pristineRelics = currency.value;
            });

            let integratedMatrices = 0;
            if (Array.isArray(bankData)) {
                bankData.forEach(item => {
                    if (item && item.id === INTEGRATED_MATRIX_ID) {
                        integratedMatrices += item.count;
                    }
                });
            }

            document.getElementById('relics').value = fractalRelics;
            document.getElementById('pristine').value = pristineRelics;
            document.getElementById('matrices').value = integratedMatrices;

            statusDiv.style.display = 'none';
            calculate(); 

        } catch (err) {
            errorDiv.innerText = err.message || 'Erro de conexão ("Failed to fetch").';
            errorDiv.style.display = 'block';
            statusDiv.style.display = 'none';
        }
    }

    function updateDailyInputs() {
        let pristineSum = 0; let matrixSum = 0; let relicsSum = 0;
        if (document.getElementById('farmT4').checked) { pristineSum += 12; relicsSum += 174; }
        if (document.getElementById('farmRecs').checked) { pristineSum += 3; relicsSum += 36; }
        if (document.getElementById('farmPotions').checked) { relicsSum += 16; }
        if (document.getElementById('cmKinfall').checked)   { pristineSum += 2; matrixSum += 1; relicsSum += 119; } 
        if (document.getElementById('cmNightmare').checked) { pristineSum += 2; matrixSum += 1; relicsSum += 159; } 
        if (document.getElementById('cmShattered').checked) { pristineSum += 2; matrixSum += 1; relicsSum += 159; } 
        if (document.getElementById('cmSunqua').checked)    { pristineSum += 2; matrixSum += 1; relicsSum += 139; } 
        if (document.getElementById('cmSilent').checked)    { pristineSum += 2; matrixSum += 1; relicsSum += 119; } 
        if (document.getElementById('cmLonely').checked)    { pristineSum += 2; matrixSum += 1; relicsSum += 139; } 

        document.getElementById('dailyPristine').value = pristineSum;
        document.getElementById('dailyMatrices').value = matrixSum;
        document.getElementById('dailyRelics').value = relicsSum;
        calculate();
    }

    async function calculate() {
        const lang = document.getElementById('langPicker').value;
        const text = translations[lang] || translations['pt'];
        const currentTitle = parseInt(document.getElementById('currentTitle').value);

        const payload = {
            currentTitle,
            pristine: parseInt(document.getElementById('pristine').value) || 0,
            relics: parseInt(document.getElementById('relics').value) || 0,
            matrices: parseInt(document.getElementById('matrices').value) || 0,
            dailyPristine: parseInt(document.getElementById('dailyPristine').value) || 0,
            dailyMatrices: parseInt(document.getElementById('dailyMatrices').value) || 0,
            dailyRelics: parseInt(document.getElementById('dailyRelics').value) || 0
        };

        try {
            const res = await fetch('/api/calcular', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            if (!res.ok) return;
            const data = await res.json();

            let finalHtml = data.htmlOutput
                .replaceAll('__LBL_COMPLETED__', text.lblCompleted)
                .replaceAll('__LBL_ALREADY_DONE__', text.lblAlreadyDone)
                .replaceAll('__LBL_NEED_STOCK__', text.lblNeedStock)
                .replaceAll('__LBL_GATE__', text.lblGate)
                .replaceAll('__GATE_NONE__', text.lblGateNone)
                .replaceAll('__GATE_READY__', text.lblGateReady)
                .replaceAll('__GATE_NORMAL__', text.lblGateNormal)
                .replaceAll('__GATE_BOTH__', text.lblGateBoth)
                .replaceAll('__GATE_PRISTINE__', text.lblGatePristine)
                .replaceAll('__GATE_MATRIX__', text.lblGateMatrix)
                .replaceAll('__LBL_DAYS__', text.lblDays)
                .replaceAll('__LBL_INF_DAYS__', text.lblInfDays)
                .replaceAll('__LBL_NO_FARM__', text.lblNoFarmActive)
                .replaceAll('__LBL_READY_BUY__', text.lblReadyBuy);

            const totalDays = data.totalDaysRemaining;
            const totalWeeks = (totalDays / 7).toFixed(1);

            if (totalDays === 0 && currentTitle < 4) {
                document.getElementById('timeResult').innerText = text.lblReadyGod;
            } else if (currentTitle === 4) {
                document.getElementById('timeResult').innerText = text.lblIsGod;
            } else if (totalDays === Infinity || isNaN(totalDays)) {
                document.getElementById('timeResult').innerText = text.lblUnfTime;
            } else {
                document.getElementById('timeResult').innerText = `${totalDays} ${text.lblDays} (~${totalWeeks} ${text.lblWeeks})`;
            }

            document.getElementById('missingResources').innerHTML = finalHtml + `
                <small>${text.lblFootnote}</small>
                <div style="text-align: center; margin-top: 25px; font-size: 10px; color: var(--text-secondary); opacity: 0.4; letter-spacing: 0.5px; line-height: 1.5;">
                    <div>${SITE_VERSION}</div>
                    <div style="margin-top: 4px;">${text.lblDevBy} <strong>${USER_NICK}</strong> (${USER_EMAIL})</div>
                </div>
            `;
        } catch(e) {
            console.error("Erro na comunicação com o backend protegido.", e);
        }
    }
</script>
</body>
</html>
