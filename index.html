<script>

        const materialsUrl =
            `https://api.guildwars2.com/v2/account/materials?access_token=${apiKey}`;

        const titlesUrl =
            `https://api.guildwars2.com/v2/account/titles?access_token=${apiKey}`;

        const [
            walletResponse,
            bankResponse,
            materialsResponse,
            titlesResponse
        ] = await Promise.all([
            fetch(walletUrl),
            fetch(bankUrl),
            fetch(materialsUrl),
            fetch(titlesUrl)
        ]);

        const walletData = await walletResponse.json();
        const bankData = await bankResponse.json();
        const materialsData = await materialsResponse.json();
        const titlesData = await titlesResponse.json();

        let fractalRelics = 0;
        let pristineRelics = 0;

        const FRACTAL_RELIC_ID = 7;
        const PRISTINE_RELIC_ID = 24;
        const INTEGRATED_MATRIX_ID = 79230;

        walletData.forEach(currency => {

            if (currency.id === FRACTAL_RELIC_ID) {
                fractalRelics = currency.value;
            }

            if (currency.id === PRISTINE_RELIC_ID) {
                pristineRelics = currency.value;
            }
        });

        let integratedMatrices = 0;

        if (Array.isArray(bankData)) {
            bankData.forEach(item => {
                if (item && item.id === INTEGRATED_MATRIX_ID) {
                    integratedMatrices += item.count;
                }
            });
        }

        if (Array.isArray(materialsData)) {
            materialsData.forEach(item => {
                if (item && item.id === INTEGRATED_MATRIX_ID) {
                    integratedMatrices += item.count;
                }
            });
        }

        let detectedTitle = 0;

        if (titlesData.includes(437)) detectedTitle = 4;
        else if (titlesData.includes(436)) detectedTitle = 3;
        else if (titlesData.includes(435)) detectedTitle = 2;
        else if (titlesData.includes(434)) detectedTitle = 1;

        document.getElementById('relics').value = fractalRelics;
        document.getElementById('pristine').value = pristineRelics;
        document.getElementById('matrices').value = integratedMatrices;
        document.getElementById('currentTitle').value = detectedTitle;

        saveLocalData();

        statusDiv.style.display = 'none';

        calculate();

    } catch(err) {

        console.error(err);

        errorDiv.innerText = err.message;
        errorDiv.style.display = 'block';
        statusDiv.style.display = 'none';
    }
}
</script>
