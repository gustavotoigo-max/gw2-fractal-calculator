<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Fractal God - GW2</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --primary: #e5a93c;
            --text: #ffffff;
            --text-secondary: #a0a0b2;
            --border: #29292e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }

        h1 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 5px;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .result-box {
            background: rgba(229, 169, 60, 0.1);
            border: 1px solid var(--primary);
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
            text-align: center;
        }

        .result-box h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .time-highlight {
            font-size: 36px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .details {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .warning {
            color: #ef4444;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Fractal God Progress</h1>
    <div class="subtitle">Descubra quanto tempo falta para o prestígio máximo</div>

    <!-- Nível Atual -->
    <div class="form-group">
        <label for="currentTitle">Seu Título Atual de Fractal</label>
        <select id="currentTitle" oninput="calculate()">
            <option value="0">Nenhum (Começando do zero)</option>
            <option value="1">Fractal Initiate</option>
            <option value="2">Fractal Adept</option>
            <option value="3">Fractal Expert</option>
            <option value="4">Fractal Champion</option>
        </select>
    </div>

    <!-- Inventário -->
    <div class="grid-inputs">
        <div class="form-group">
            <label for="pristine">Pristine Relics Atuais</label>
            <input type="number" id="pristine" value="0" min="0" oninput="calculate()">
        </div>
        <div class="form-group">
            <label for="matrices">Matrices (IFM) Atuais</label>
            <input type="number" id="matrices" value="0" min="0" oninput="calculate()">
        </div>
    </div>

    <div class="grid-inputs">
        <div class="form-group">
            <label for="relics">Fractal Relics Atuais</label>
            <input type="number" id="relics" value="0" min="0" oninput="calculate()">
        </div>
        <div class="form-group">
            <label for="gold">Ouro no Banco</label>
            <input type="number" id="gold" value="0" min="0" oninput="calculate()">
        </div>
    </div>

    <!-- Ritmo de Jogo -->
    <div class="form-group">
        <label for="dailyPristine">Pristine Relics ganhas por dia (Ex: CMs + T4 = 15)</label>
        <input type="number" id="dailyPristine" value="15" min="1" oninput="calculate()">
    </div>

    <!-- Resultados -->
    <div class="result-box">
        <h2>Tempo Restante Estimado</h2>
        <div class="time-highlight" id="timeResult">0 dias</div>
        <div class="details" id="missingResources">
            Selecione seus dados para calcular.
        </div>
    </div>
</div>

<script>
    // Custos totais acumulados do zero até o final para cada nível inicial
    // Índice representa o título atual do jogador (0 a 4)
    const totalRequirements = [
        { pristine: 3200, matrices: 1200, relics: 44000, gold: 1600 }, // Começando do zero
        { pristine: 2400, matrices: 1000, relics: 36000, gold: 1200 }, // Já é Initiate
        { pristine: 1600, matrices: 800,  relics: 28000, gold: 800 },  // Já é Adept
        { pristine: 800,  matrices: 500,  relics: 18000, gold: 400 },  // Já é Expert
        { pristine: 400,  matrices: 300,  relics: 10000, gold: 200 }   // Já é Champion
    ];

    function calculate() {
        // Obter valores dos inputs
        const currentTitle = parseInt(document.getElementById('currentTitle').value);
        const currentPristine = parseInt(document.getElementById('pristine').value) || 0;
        const currentMatrices = parseInt(document.getElementById('matrices').value) || 0;
        const currentRelics = parseInt(document.getElementById('relics').value) || 0;
        const currentGold = parseInt(document.getElementById('gold').value) || 0;
        const dailyRate = parseInt(document.getElementById('dailyPristine').value) || 1;

        // Buscar meta necessária baseada no nível atual
        const target = totalRequirements[currentTitle];

        // Calcular o que falta (Garantindo que não fique negativo)
        const missingPristine = Math.max(0, target.pristine - currentPristine);
        const missingMatrices = Math.max(0, target.matrices - currentMatrices);
        const missingRelics = Math.max(0, target.relics - currentRelics);
        const missingGold = Math.max(0, target.gold - currentGold);

        // Cálculo do tempo baseado no gargalo temporal real (Pristines)
        const daysRemaining = Math.ceil(missingPristine / dailyRate);
        const weeks = (daysRemaining / 7).toFixed(1);

        // Atualizar a tela
        if (missingPristine === 0 && currentTitle === 4) {
            document.getElementById('timeResult').innerText = "Você já pode pegar!";
            document.getElementById('missingResources').innerHTML = "Parabéns! Você tem as Pristines necessárias para o Fractal God.";
            return;
        }

        document.getElementById('timeResult').innerText = `${daysRemaining} dias (~${weeks} semanas)`;
        
        document.getElementById('missingResources').innerHTML = `
            <strong>Ainda faltam para a meta:</strong><br>
            • ${missingPristine.toLocaleString()} Pristine Relics<br>
            • ${missingMatrices.toLocaleString()} Integrated Matrices<br>
            • ${missingRelics.toLocaleString()} Fractal Relics comuns<br>
            • ${missingGold.toLocaleString()} de Ouro<br>
            <small style="display:block; margin-top:10px; color: var(--text-secondary);">
                *O tempo é calculado estritamente pelas Pristine Relics necessárias, que costumam ditar o limite diário da conta.
            </small>
        `;
    }

    // Executa uma vez ao abrir a página
    calculate();
</script>

</body>
</html>
