<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calculadora Fractal God - GW2</title>

    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --primary: #e5a93c;
            --text: #ffffff;
            --text-secondary: #a0a0b2;
            --border: #29292e;
            --tier-bg: #222226;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 24px rgba(0,0,0,0.45);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 30px;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 13px;
        }

        h3 {
            color: var(--primary);
            font-size: 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
            margin-top: 25px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Seção de Checkboxes */
        .farm-section {
            background: var(--tier-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 25px;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        @media(min-width: 480px) {
            .checkbox-group {
                grid-template-columns: 1fr 1fr;
            }
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            background: var(--bg-color);
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .checkbox-item:hover {
            border-color: #444;
        }

        .checkbox-item input {
            width: auto;
            margin-right: 12px;
            transform: scale(1.2);
            accent-color: var(--primary);
            cursor: pointer;
        }

        .checkbox-item span {
            font-size: 14px;
            color: var(--text);
        }

        .checkbox-item .desc {
            font-size: 11px;
            color: var(--text-secondary);
            display: block;
            margin-top: 2px;
        }

        .sub-group-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--primary);
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 8px;
            grid-column: 1 / -1;
        }

        .result-box {
            margin-top: 30px;
            padding: 22px;
            border-radius: 10px;
            border: 1px solid var(--primary);
            background: rgba(229, 169, 60, 0.08);
        }

        .result-box h2 {
            margin-top: 0;
            text-align: center;
            font-size: 16px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .time-highlight {
            text-align: center;
            font-size: 38px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .details {
            border-radius: 8px;
            line-height: 1.8;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .tier-card {
            background: var(--tier-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 12px;
        }

        .tier-card.completed {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.05);
        }

        .tier-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: var(--text);
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
            margin-bottom: 8px;
        }

        .tier-header .status {
            color: var(--primary);
        }

        .tier-card.completed .tier-header .status {
            color: #22c55e;
        }

        .resource {
            color: var(--text);
            font-weight: bold;
        }

        small {
            display: block;
            margin-top: 15px;
            line-height: 1.5;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Fractal God Timeline</h1>

    <div class="subtitle">
        Cálculo passo a passo baseado na progressão linear de upgrades da Wiki de GW2
    </div>

    <!-- Título Atual -->
    <div class="form-group">
        <label for="currentTitle">Seu título atual</label>
        <select id="currentTitle" oninput="calculate()">
            <option value="0">Nenhum</option>
            <option value="1">Fractal Savant</option>
            <option value="2">Fractal Prodigy</option>
            <option value="3">Fractal Champion</option>
            <option value="4">Fractal God</option>
        </select>
    </div>

    <!-- Recursos atuais -->
    <h3>Seu Inventário Atual</h3>
    <div class="grid-inputs">
        <div class="form-group">
            <label for="pristine">Pristine Fractal Relics atuais</label>
            <input type="number" id="pristine" value="0" min="0" oninput="calculate()">
        </div>
        <div class="form-group">
            <label for="relics">Fractal Relics atuais</label>
            <input type="number" id="relics" value="0" min="0" oninput="calculate()">
        </div>
    </div>
    <div class="form-group">
        <label for="matrices">Integrated Fractal Matrices atuais</label>
        <input type="number" id="matrices" value="0" min="0" oninput="calculate()">
    </div>

    <!-- Filtros de Farm Ativo -->
    <h3>Sua Rotina Diária de Farm</h3>
    <div class="farm-section">
        <div class="checkbox-group">
            <div class="sub-group-title">Dailies Padrão</div>
            <label class="checkbox-item">
                <input type="checkbox" id="farmT4" checked onchange="updateDailyInputs()">
                <div>
                    <span>Fractals T4</span>
                    <span class="desc">+12 Pristines | ~325 Relics</span>
                </div>
            </label>
            <label class="checkbox-item">
                <input type="checkbox" id="farmRecs" checked onchange="updateDailyInputs()">
                <div>
                    <span>Recomendadas (Recs)</span>
                    <span class="desc">+3 Pristines | ~60 Relics</span>
                </div>
            </label>

            <div class="sub-group-title">Challenge Modes (CMs)</div>
            <label class="checkbox-item">
                <input type="checkbox" id="cmNightmare" checked onchange="updateDailyInputs()">
                <div>
                    <span>97 - Nightmare</span>
                    <span class="desc">+2 Pristines | +1 Matrix | ~50 Relics</span>
                </div>
            </label>
            <label class="checkbox-item">
                <input type="checkbox" id="cmShattered" checked onchange="updateDailyInputs()">
                <div>
                    <span>98 - Shattered Obs.</span>
                    <span class="desc">+2 Pristines | +1 Matrix | ~50 Relics</span>
                </div>
            </label>
            <label class="checkbox-item">
                <input type="checkbox" id="cmSunqua" checked onchange="updateDailyInputs()">
                <div>
                    <span>99 - Sunqua Peak</span>
                    <span class="desc">+2 Pristines | +1 Matrix | ~55 Relics</span>
                </div>
            </label>
            <label class="checkbox-item">
                <input type="checkbox" id="cmSilent" checked onchange="updateDailyInputs()">
                <div>
                    <span>100 - Silent Surf</span>
                    <span class="desc">+2 Pristines | +1 Matrix | ~65 Relics</span>
                </div>
            </label>
            <label class="checkbox-item">
                <input type="checkbox" id="cmLonely" checked onchange="updateDailyInputs()">
                <div>
                    <span>103 - Lonely Tower</span>
                    <span class="desc">+2 Pristines | +1 Matrix | ~65 Relics</span>
                </div>
            </label>
            <label class="checkbox-item">
                <input type="checkbox" id="cmKinfall" checked onchange="updateDailyInputs()">
                <div>
                    <span>105 - Kinfall</span>
                    <span class="desc">+2 Pristines | +1 Matrix | ~55 Relics</span>
                </div>
            </label>
        </div>
    </div>

    <!-- Ganhos diários calculated/manuais -->
    <h3>Ganhos Diários Calculados</h3>
    <div class="grid-inputs">
        <div class="form-group">
            <label for="dailyPristine">Pristine Relics / dia</label>
            <input type="number" id="dailyPristine" value="27" min="0" oninput="calculate()">
        </div>
        <div class="form-group">
            <label for="dailyMatrices">Integrated Matrices / dia</label>
            <input type="number" id="dailyMatrices" value="6" min="0" oninput="calculate()">
        </div>
    </div>
    <div class="form-group">
        <label for="dailyRelics">Fractal Relics Normais / dia (Estimativa)</label>
        <input type="number" id="dailyRelics" value="725" min="0" oninput="calculate()">
    </div>

    <!-- Resultado -->
    <div class="result-box">
        <h2>Tempo Total Restante até o Fractal God</h2>
        <div class="time-highlight" id="timeResult">0 dias</div>
        
        <div class="details" id="missingResources">
            <!-- Os cards de cada etapa e o versionamento vão surgir aqui via JavaScript -->
        </div>
    </div>

</div>

<script>
    // ======= CONFIGURAÇÃO DE VERSIONAMENTO E CRÉDITOS =======
    const SITE_VERSION = "v1.1.2"; 
    const USER_NICK    = "SeuNickAqui";       // Mude aqui para o seu Nick do jogo
    const USER_EMAIL   = "seu@email.com";     // Mude aqui para o seu E-mail
    // ========================================================

    // Custos EXATOS e INDIVIDUAIS de cada degrau de upgrade
    const tierData = [
        { level: 1, name: "Nenhum ➔ Fractal Savant",     pristine: 0,    relics: 25000,  matrices: 75  },
        { level: 2, name: "Savant ➔ Fractal Prodigy",    pristine: 1200, relics: 35000,  matrices: 150 },
        { level: 3, name: "Prodigy ➔ Fractal Champion",  pristine: 0,    relics: 45000,  matrices: 225 },
        { level: 4, name: "Champion ➔ Fractal God",     pristine: 2000, relics: 55000,  matrices: 400 }
    ];

    // Atualiza as caixas de entrada de recursos diários baseado nos checkboxes marcados
    function updateDailyInputs() {
        let pristineSum = 0;
        let matrixSum = 0;
        let relicsSum = 0;

        // Dailies normais
        if (document.getElementById('farmT4').checked) {
            pristineSum += 12;
            relicsSum += 325;
        }
        if (document.getElementById('farmRecs').checked) {
            pristineSum += 3;
            relicsSum += 60;
        }

        // CMs individuais
        if (document.getElementById('cmNightmare').checked) { pristineSum += 2; matrixSum += 1; relicsSum += 50; }
        if (document.getElementById('cmShattered').checked) { pristineSum += 2; matrixSum += 1; relicsSum += 50; }
        if (document.getElementById('cmSunqua').checked)    { pristineSum += 2; matrixSum += 1; relicsSum += 57; }
        if (document.getElementById('cmSilent').checked)    { pristineSum += 2; matrixSum += 1; relicsSum += 65; }
        if (document.getElementById('cmLonely').checked)    { pristineSum += 2; matrixSum += 1; relicsSum += 65; }
        if (document.getElementById('cmKinfall').checked)   { pristineSum += 2; matrixSum += 1; relicsSum += 57; }

        // Injeta os valores calculados nas caixas de texto
        document.getElementById('dailyPristine').value = pristineSum;
        document.getElementById('dailyMatrices').value = matrixSum;
        document.getElementById('dailyRelics').value = relicsSum;

        // Roda a matemática principal da progressão
        calculate();
    }

    function calculate() {
        const currentTitle = parseInt(document.getElementById('currentTitle').value);
        
        // Clona os recursos inseridos para simular os gastos sem alterar os inputs originais
        let wallet = {
            pristine: parseInt(document.getElementById('pristine').value) || 0,
            relics: parseInt(document.getElementById('relics').value) || 0,
            matrices: parseInt(document.getElementById('matrices').value) || 0
        };

        const dailyPristine = parseInt(document.getElementById('dailyPristine').value) || 0;
        const dailyMatrices = parseInt(document.getElementById('dailyMatrices').value) || 0;
        const dailyRelics = parseInt(document.getElementById('dailyRelics').value) || 0;

        let totalDaysRemaining = 0;
        let htmlOutput = "";

        // Varre todas as etapas da progressão sequencialmente
        for (let i = 0; i < tierData.length; i++) {
            const tier = tierData[i];

            // Se o jogador já passou desse nível, o card fica verde e limpo
            if (currentTitle >= tier.level) {
                htmlOutput += `
                    <div class="tier-card completed">
                        <div class="tier-header">
                            <span>${tier.name}</span>
                            <span class="status">✓ Concluído</span>
                        </div>
                        <div>Você já domina este tier ou passou dele!</div>
                    </div>
                `;
                continue;
            }

            // Descobre o custo líquido abatendo o saldo disponível na carteira simulada
            const neededPristine = Math.max(0, tier.pristine - wallet.pristine);
            const neededRelics = Math.max(0, tier.relics - wallet.relics);
            const neededMatrices = Math.max(0, tier.matrices - wallet.matrices);

            // textAtualiza a carteira
            wallet.pristine = Math.max(0, wallet.pristine - tier.pristine);
            wallet.relics = Math.max(0, wallet.relics - tier.relics);
            wallet.matrices = Math.max(0, wallet.matrices - tier.matrices);

            const pristineDays = dailyPristine > 0 ? Math.ceil(neededPristine / dailyPristine) : (neededPristine > 0 ? Infinity : 0);
            const matrixDays = dailyMatrices > 0 ? Math.ceil(neededMatrices / dailyMatrices) : (neededMatrices > 0 ? Infinity : 0);
            const relicsDays = dailyRelics > 0 ? Math.ceil(neededRelics / dailyRelics) : (neededRelics > 0 ? Infinity : 0);

            const tierDays = Math.max(pristineDays, matrixDays, relicsDays);

            if(tierDays !== Infinity) {
                totalDaysRemaining += tierDays;
            }

            let stepGate = "Nenhum";
            if (tierDays === 0) {
                stepGate = "Nenhum (Pronto!)";
            } else if (tierDays === relicsDays) {
                stepGate = "Fractal Relics Normais";
            } else if (tierDays === pristineDays && tierDays === matrixDays) {
                stepGate = "Pristines e Matrices";
            } else if (tierDays === pristineDays) {
                stepGate = "Pristine Relics";
            } else if (tierDays === matrixDays) {
                stepGate = "Integrated Matrices";
            }

            let daysLabel = `+${tierDays} dias`;
            if (tierDays === Infinity) { daysLabel = "Infinitos dias (Sem farm ativo)"; stepGate = "Falta ativar uma fonte de farm!"; }
            else if (tierDays === 0) { daysLabel = "Pronto para comprar"; }

            htmlOutput += `
                <div class="tier-card">
                    <div class="tier-header">
                        <span>${tier.name}</span>
                        <span class="status">${daysLabel}</span>
                    </div>
                    <strong>Falta estocar nesta etapa:</strong><br>
                    • Pristines: <span class="resource">${neededPristine.toLocaleString()}</span> | 
                    • Relics: <span class="resource">${neededRelics.toLocaleString()}</span> | 
                    • Matrices: <span class="resource">${neededMatrices.toLocaleString()}</span><br>
                    <small style="text-align: left; margin-top: 5px; color: var(--text-secondary); font-size: 12px;">
                        Gargalo desta etapa: <span style="color: var(--primary); font-weight:600;">${stepGate}</span>
                    </small>
                </div>
            `;
        }

        const totalWeeks = (totalDaysRemaining / 7).toFixed(1);
        if (totalDaysRemaining === 0 && currentTitle < 4) {
            document.getElementById('timeResult').innerText = "Pronto para virar Deus!";
        } else if (currentTitle === 4) {
            document.getElementById('timeResult').innerText = "Fractal God!";
        } else if (totalDaysRemaining === Infinity || isNaN(totalDaysRemaining)) {
            document.getElementById('timeResult').innerText = "Tempo Indeterminado";
        } else {
            document.getElementById('timeResult').innerText = `${totalDaysRemaining} dias (~${totalWeeks} semanas)`;
        }

        // Injeta os cards parciais criados dinamicamente com as notas explicativas, versão e seus créditos logo abaixo
        document.getElementById('missingResources').innerHTML = htmlOutput + `
            <small>
                *O cronômetro mestre soma os gargalos parciais considerando que você acumula os recursos em ordem linear de conquistas.
            </small>
            
            <div style="text-align: center; margin-top: 25px; font-size: 10px; color: var(--text-secondary); opacity: 0.4; letter-spacing: 0.5px; line-height: 1.5;">
                <div>${SITE_VERSION}</div>
                <div style="margin-top: 4px;">Desenvolvido por: <strong>${Nahar.5349}</strong></div>
            </div>
        `;
    }

    // Inicializa calculando com os padrões marcados
    updateDailyInputs();
</script>

</body>
</html>
