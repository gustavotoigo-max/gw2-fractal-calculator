<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calculadora Fractal God - GW2</title>

    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --primary: #e5a93c;
            --text: #ffffff;
            --text-secondary: #a0a0b2;
            --border: #29292e;
            --tier-bg: #222226;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 24px rgba(0,0,0,0.45);
            position: relative;
        }

        .language-picker {
            position: absolute;
            top: 20px;
            right: 20px;
            width: auto;
            padding: 6px 10px;
            font-size: 14px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 30px;
            letter-spacing: 1px;
            padding-top: 15px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 13px;
        }

        h3 {
            color: var(--primary);
            font-size: 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
            margin-top: 25px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .farm-section {
            background: var(--tier-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 25px;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        @media(min-width: 480px) {
            .checkbox-group {
                grid-template-columns: 1fr 1fr;
            }
            h1 { padding-top: 0; }
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            background: var(--bg-color);
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .checkbox-item:hover {
            border-color: #444;
        }

        .checkbox-item input {
            width: auto;
            margin-right: 12px;
            transform: scale(1.2);
            accent-color: var(--primary);
            cursor: pointer;
        }

        .checkbox-item span {
            font-size: 14px;
            color: var(--text);
        }
