<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calculadora Fractal God - GW2</title>

    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --primary: #e5a93c;
            --text: #ffffff;
            --text-secondary: #a0a0b2;
            --border: #29292e;
            --tier-bg: #222226;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 24px rgba(0,0,0,0.45);
            position: relative;
        }

        .language-picker {
            position: absolute;
            top: 20px;
            right: 20px;
            width: auto;
            padding: 6px 10px;
            font-size: 14px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 30px;
            letter-spacing: 1px;
            padding-top: 15px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 13px;
        }

        h3 {
            color: var(--primary);
            font-size: 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
            margin-top: 25px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .farm-section {
            background: var(--tier-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 25px;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        @media(min-width: 480px) {
            .checkbox-group {
                grid-template-columns: 1fr 1fr;
            }
            h1 { padding-top: 0; }
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            background: var(--bg-color);
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .checkbox-item:hover {
            border-color: #444;
        }

        .checkbox-item input {
            width: auto;
            margin-right: 12px;
            transform: scale(1.2);
            accent-color: var(--primary);
            cursor: pointer;
        }

        .checkbox-item span {
            font-size: 14px;
            color: var(--text);
        }

        .checkbox-item .desc {
            font-size: 11px;
            color: var(--text-secondary);
            display: block;
            margin-top: 2px;
        }

        .sub-group-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--primary);
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 8px;
            grid-column: 1 / -1;
        }

        .result-box {
            margin-top: 30px;
            padding: 22px;
            border-radius: 10px;
            border: 1px solid var(--primary);
            background: rgba(229, 169, 60, 0.08);
        }

        .result-box h2 {
            margin-top: 0;
            text-align: center;
            font-size: 16px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .time-highlight {
            text-align: center;
            font-size: 38px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .details {
            border-radius: 8px;
            line-height: 1.8;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .tier-card {
            background: var(--tier-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 12px;
        }

        .tier-card.completed {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.05);
        }

        .tier-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: var(--text);
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
            margin-bottom: 8px;
        }

        .tier-header .status {
            color: var(--primary);
        }

        .tier-card.completed .tier-header .status {
            color: #22c55e;
        }

        .resource {
            color: var(--text);
            font-weight: bold;
        }

        small {
            display: block;
            margin-top: 15px;
            line-height: 1.5;
            text-align: center;
        }
    </style>
</head>

                </div>
            </label>

                    <span>96 - Nightmare</span>

            </label>

    function changeLanguage() {
        const lang = document.getElementById('langPicker').value;
        const text = translations[lang];

    }

    const tierData = [
        { level: 1, name: "Nenhum ➔ Fractal Savant",     pristine: 0,    relics: 25000,  matrices: 75  },
        { level: 2, name: "Savant ➔ Fractal Prodigy",    pristine: 1200, relics: 35000,  matrices: 150 },
        { level: 3, name: "Prodigy ➔ Fractal Champion",  pristine: 0,    relics: 45000,  matrices: 225 },
        { level: 4, name: "Champion ➔ Fractal God",     pristine: 2000, relics: 55000,  matrices: 400 }
    ];

    function updateDailyInputs() {
        let pristineSum = 0;
        let matrixSum = 0;
        let relicsSum = 0;

        if (document.getElementById('farmT4').checked) {
            pristineSum += 12;
            relicsSum += 325;
        }
        if (document.getElementById('farmRecs').checked) {
            pristineSum += 3;
            relicsSum += 60;
        }

        if (document.getElementById('cmKinfall').checked)   { pristineSum += 2; matrixSum += 1; relicsSum += 57; }
        if (document.getElementById('cmNightmare').checked) { pristineSum += 2; matrixSum += 1; relicsSum += 50; }
        if (document.getElementById('cmShattered').checked) { pristineSum += 2; matrixSum += 1; relicsSum += 50; }
        if (document.getElementById('cmSunqua').checked)    { pristineSum += 2; matrixSum += 1; relicsSum += 57; }
        if (document.getElementById('cmSilent').checked)    { pristineSum += 2; matrixSum += 1; relicsSum += 65; }
        if (document.getElementById('cmLonely').checked)    { pristineSum += 2; matrixSum += 1; relicsSum += 65; }

        document.getElementById('dailyPristine').value = pristineSum;
        document.getElementById('dailyMatrices').value = matrixSum;
        document.getElementById('dailyRelics').value = relicsSum;

        calculate();
    }

    function calculate() {
        const lang = document.getElementById('langPicker').value;
        const text = translations[lang];
        const currentTitle = parseInt(document.getElementById('currentTitle').value);
        
        let wallet = {
            pristine: parseInt(document.getElementById('pristine').value) || 0,
            relics: parseInt(document.getElementById('relics').value) || 0,
            matrices: parseInt(document.getElementById('matrices').value) || 0
        };

        const dailyPristine = parseInt(document.getElementById('dailyPristine').value) || 0;
        const dailyMatrices = parseInt(document.getElementById('dailyMatrices').value) || 0;
        const dailyRelics = parseInt(document.getElementById('dailyRelics').value) || 0;

        let totalDaysRemaining = 0;
        let htmlOutput = "";

        for (let i = 0; i < tierData.length; i++) {
            const tier = tierData[i];

            if (currentTitle >= tier.level) {
                htmlOutput += `
                    <div class="tier-card completed">
                        <div class="tier-header">
                            <span>${tier.name}</span>
                            <span class="status">${text.lblCompleted}</span>
                        </div>
                        <div>${text.lblAlreadyDone}</div>
                    </div>
                `;
                continue;
            }

            const neededPristine = Math.max(0, tier.pristine - wallet.pristine);
            const neededRelics = Math.max(0, tier.relics - wallet.relics);
            const neededMatrices = Math.max(0, tier.matrices - wallet.matrices);

            wallet.pristine = Math.max(0, wallet.pristine - tier.pristine);
            wallet.relics = Math.max(0, wallet.relics - tier.relics);
            wallet.matrices = Math.max(0, wallet.matrices - tier.matrices);

            const pristineDays = dailyPristine > 0 ? Math.ceil(neededPristine / dailyPristine) : (neededPristine > 0 ? Infinity : 0);
            const matrixDays = dailyMatrices > 0 ? Math.ceil(neededMatrices / dailyMatrices) : (neededMatrices > 0 ? Infinity : 0);
            const relicsDays = dailyRelics > 0 ? Math.ceil(neededRelics / dailyRelics) : (neededRelics > 0 ? Infinity : 0);

            const tierDays = Math.max(pristineDays, matrixDays, relicsDays);

            if(tierDays !== Infinity) {
                totalDaysRemaining += tierDays;
            }

            let stepGate = text.lblGateNone;
            if (tierDays === 0) {
                stepGate = text.lblGateReady;
            } else if (tierDays === relicsDays) {
                stepGate = text.lblGateNormal;
            } else if (tierDays === pristineDays && tierDays === matrixDays) {
                stepGate = text.lblGateBoth;
            } else if (tierDays === pristineDays) {
                stepGate = text.lblGatePristine;
            } else if (tierDays === matrixDays) {
                stepGate = text.lblGateMatrix;
            }

            let daysLabel = `+${tierDays} ${text.lblDays}`;
            if (tierDays === Infinity) { daysLabel = text.lblInfDays; stepGate = text.lblNoFarmActive; }
            else if (tierDays === 0) { daysLabel = text.lblReadyBuy; }

            htmlOutput += `
                <div class="tier-card">
                    <div class="tier-header">
                        <span>${tier.name}</span>
                        <span class="status">${daysLabel}</span>
                    </div>
                    <strong>${text.lblNeedStock}</strong><br>
                    • Pristines: <span class="resource">${neededPristine.toLocaleString()}</span> | 
                    • Relics: <span class="resource">${neededRelics.toLocaleString()}</span> | 
                    • Matrices: <span class="resource">${neededMatrices.toLocaleString()}</span><br>
                    <small style="text-align: left; margin-top: 5px; color: var(--text-secondary); font-size: 12px;">
                        ${text.lblGate} <span style="color: var(--primary); font-weight:600;">${stepGate}</span>
                    </small>
                </div>
            `;
        }

        const totalWeeks = (totalDaysRemaining / 7).toFixed(1);
        if (totalDaysRemaining === 0 && currentTitle < 4) {
            document.getElementById('timeResult').innerText = text.lblReadyGod;
        } else if (currentTitle === 4) {
            document.getElementById('timeResult').innerText = text.lblIsGod;
        } else if (totalDaysRemaining === Infinity || isNaN(totalDaysRemaining)) {
            document.getElementById('timeResult').innerText = text.lblUnfTime;
        } else {
            document.getElementById('timeResult').innerText = `${totalDaysRemaining} ${text.lblDays} (~${totalWeeks} ${text.lblWeeks})`;
        }

        document.getElementById('missingResources').innerHTML = htmlOutput + `
            <small>
                ${text.lblFootnote}
            </small>
            
            <div style="text-align: center; margin-top: 25px; font-size: 10px; color: var(--text-secondary); opacity: 0.4; letter-spacing: 0.5px; line-height: 1.5;">
                <div>${SITE_VERSION}</div>
                <div style="margin-top: 4px;">${text.lblDevBy} <strong>${USER_NICK}</strong> (${USER_EMAIL})</div>
            </div>
        `;
    }

    updateDailyInputs();
    changeLanguage();
</script>

</body>
</html>
